    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segment Training Sandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>User Identification</h2>
        <p class="description">
            Fill this out to test your Segment <code>identify()</code> and <code>track()</code> calls.
        </p>

        <form id="userForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Jane Doe" required>
            </div>

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="25" required>
            </div>

            <div class="form-group">
                <label>Preference</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="animal" value="cats" checked> Cats
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="animal" value="dogs"> Dogs
                    </label>
                </div>
            </div>

            <button type="submit">Submit Data</button>
        </form>
    </div>

<script type="text/javascript">
  // We attach the listener to the form ID
  const form = document.getElementById('userForm');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    // 1. Extract values from your form fields
    var fullname = this["name"].value;
    var age = this["age"].value;
    var animal = this["animal"].value; // This gets the selected radio value

    // 2. Identify the user 
    // We'll use a placeholder ID 'user_01' for testing
    analytics.identify('1234', {
      name: fullname,
      age: age,
      favorite_animal: animal // This saves the preference to the user profile
    });

    // 3. Track the action
    // We pass the animal preference as a property of the event
    analytics.track('Form Submitted', {
      full_name: fullname,
      age: age,
      preferred_pet: animal
    }, function() {
      // Optional: Refresh or redirect after the event is sent
      console.log('Segment calls sent successfully!');
      alert('Check your Segment Debugger!');
    });
  });
</script>

</body>
</html>
